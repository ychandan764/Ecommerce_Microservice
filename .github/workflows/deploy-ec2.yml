name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build modules
        run: |
          for module in configserver eureka gateway E_User E_Product E_Order notification; do
            (cd "$module" && mvn -q -DskipTests package)
          done

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "mkdir -p '${EC2_APP_DIR}'"
          rsync -az --delete \
            --delete-excluded \
            --exclude .git \
            --exclude .idea \
            --exclude .env \
            --exclude target \
            ./ "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/"

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "cd '${EC2_APP_DIR}' && docker compose -f docker-compose.ec2.yml up -d --build --remove-orphans"
