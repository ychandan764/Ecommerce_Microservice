name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: configserver
            context: ./configserver
            file: ./configserver/Dockerfile
            image: configserver
          - name: eureka-server
            context: ./eureka
            file: ./eureka/Dockerfile
            image: eureka-server
          - name: gateway
            context: ./gateway
            file: ./gateway/Dockerfile
            image: gateway
          - name: user-service
            context: ./E_User
            file: ./E_User/Dockerfile
            image: user-service
          - name: product-service
            context: ./E_Product
            file: ./E_Product/Dockerfile
            image: product-service
          - name: order-service
            context: ./E_Order
            file: ./E_Order/Dockerfile
            image: order-service
          - name: notification
            context: ./notification
            file: ./notification/Dockerfile
            image: notification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deployment files
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "mkdir -p '${EC2_APP_DIR}/rabbitmq'"
          rsync -az --delete \
            --exclude .git \
            --exclude .idea \
            --exclude target \
            ./docker-compose.ec2.yml "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/"
          rsync -az ./rabbitmq/rabbitmq.conf "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/rabbitmq/"

      - name: Pull and restart on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" "cd '${EC2_APP_DIR}' && printf '%s' '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ secrets.REGISTRY_USERNAME }}' --password-stdin && IMAGE_REGISTRY='${IMAGE_REGISTRY}' IMAGE_TAG='${IMAGE_TAG}' docker compose -f docker-compose.ec2.yml pull && IMAGE_REGISTRY='${IMAGE_REGISTRY}' IMAGE_TAG='${IMAGE_TAG}' docker compose -f docker-compose.ec2.yml up -d --remove-orphans"
