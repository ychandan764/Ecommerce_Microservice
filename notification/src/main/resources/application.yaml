spring:
  application:
    name: notification
  rabbitmq:
    exchange:
      name: order.exchange
    queue:
      name: order.queue
    routing-key: order.tracking
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}
    listener:
      simple:
        missing-queues-fatal: false

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


