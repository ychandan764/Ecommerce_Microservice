services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-userdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-init:
    image: postgres:15-alpine
    container_name: ecommerce-db-init
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -ec '
      export PGPASSWORD="$$POSTGRES_PASSWORD";
      until pg_isready -h "$$POSTGRES_HOST" -p "$$POSTGRES_PORT" -U "$$POSTGRES_USER" >/dev/null 2>&1; do sleep 1; done;
      createdb -h "$$POSTGRES_HOST" -p "$$POSTGRES_PORT" -U "$$POSTGRES_USER" productdb 2>/dev/null || true;
      createdb -h "$$POSTGRES_HOST" -p "$$POSTGRES_PORT" -U "$$POSTGRES_USER" orderdb 2>/dev/null || true;
      '

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  configserver:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/configserver:${IMAGE_TAG:-latest}
    container_name: ecommerce-configserver
    restart: unless-stopped
    environment:
      CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: classpath:/config/,file:/config/
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 12
      start_period: 60s

  eureka-server:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/eureka-server:${IMAGE_TAG:-latest}
    container_name: ecommerce-eureka
    restart: unless-stopped
    environment:
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      configserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/gateway:${IMAGE_TAG:-latest}
    container_name: ecommerce-gateway
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICES_EUREKA_URL: http://eureka-server:8761
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/swagger-ui.html >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  user-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/user-service:${IMAGE_TAG:-latest}
    container_name: ecommerce-user
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8081:8081"
    depends_on:
      configserver:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  product-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/product-service:${IMAGE_TAG:-latest}
    container_name: ecommerce-product
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: ${PRODUCT_DB_URL:-jdbc:postgresql://postgres:5432/productdb}
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8082:8082"
    depends_on:
      configserver:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  order-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/order-service:${IMAGE_TAG:-latest}
    container_name: ecommerce-order
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: ${ORDER_DB_URL:-jdbc:postgresql://postgres:5432/orderdb}
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      CLIENTS_USER_SERVICE_URL: http://user-service:8081
      CLIENTS_PRODUCT_SERVICE_URL: http://product-service:8082
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8083:8083"
    depends_on:
      configserver:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  notification:
    image: ${IMAGE_REGISTRY:-ghcr.io/ychandan764}/notification:${IMAGE_TAG:-latest}
    container_name: ecommerce-notification
    restart: unless-stopped
    environment:
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  postgres_data:
  rabbitmq_data:
