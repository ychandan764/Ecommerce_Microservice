services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-userdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

  redis:
    image: redis:alpine
    container_name: ecommerce-redis
    restart: unless-stopped

  configserver:
    build:
      context: ./configserver
    container_name: ecommerce-configserver
    restart: unless-stopped
    environment:
      CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: classpath:/config/,file:/config/
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      - rabbitmq

  eureka-server:
    build:
      context: ./eureka
    container_name: ecommerce-eureka
    restart: unless-stopped
    environment:
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - configserver

  gateway:
    build:
      context: ./gateway
    container_name: ecommerce-gateway
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICES_EUREKA_URL: http://eureka-server:8761
    ports:
      - "8080:8080"
    depends_on:
      - configserver
      - eureka-server
      - redis

  user-service:
    build:
      context: ./E_User
    container_name: ecommerce-user
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8081:8081"
    depends_on:
      - configserver
      - eureka-server
      - postgres
      - rabbitmq

  product-service:
    build:
      context: ./E_Product
    container_name: ecommerce-product
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8082:8082"
    depends_on:
      - configserver
      - eureka-server
      - postgres
      - rabbitmq

  order-service:
    build:
      context: ./E_Order
    container_name: ecommerce-order
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8083:8083"
    depends_on:
      - configserver
      - eureka-server
      - postgres
      - rabbitmq

  notification:
    build:
      context: ./notification
    container_name: ecommerce-notification
    restart: unless-stopped
    environment:
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    ports:
      - "8084:8084"
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
